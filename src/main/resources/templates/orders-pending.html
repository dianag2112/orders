<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pending Orders — Magelan</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}" href="/styles.css">
</head>
<body style="background:#000;color:#fff;font-family:Arial,sans-serif;padding:30px;">

<div style="max-width:900px;margin:0 auto;">
    <h1 style="font-family:'Pirata One',cursive;color:#ff1a1a;">Pending Order</h1>

    <div th:if="${pendingOrder == null || #lists.isEmpty(pendingOrder.items)}">
        <p>No pending order yet.</p>
        <a th:href="@{/menu}" href="/menu" style="color:#ff4d4d;">Back to menu</a>
    </div>

    <div th:if="${pendingOrder != null && !#lists.isEmpty(pendingOrder.items)}">
        <p><strong>Table:</strong> <span th:text="${pendingOrder.tableName}">1</span></p>
        <p><strong>Status:</strong> <span th:text="${pendingOrder.orderStatus}">PENDING</span></p>

        <table style="width:100%;border-collapse:collapse;margin-top:20px;">
            <thead>
            <tr>
                <th style="text-align:left;border-bottom:1px solid #444;padding:10px;">Item</th>
                <th style="text-align:left;border-bottom:1px solid #444;padding:10px;">Qty</th>
                <th style="text-align:left;border-bottom:1px solid #444;padding:10px;">Unit Price</th>
                <th style="text-align:left;border-bottom:1px solid #444;padding:10px;">Total</th>
                <th style="text-align:left;border-bottom:1px solid #444;padding:10px;">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${pendingOrder.items}">
                <td style="padding:10px;border-bottom:1px solid #222;" th:text="${item.product.name}">Name</td>
                <td style="padding:10px;border-bottom:1px solid #222;" th:text="${item.quantity}">1</td>
                <td style="padding:10px;border-bottom:1px solid #222;"
                    th:text="${#numbers.formatDecimal(item.unitPrice,1,'POINT',2,'POINT')} + ' €'">0.00 €</td>
                <td style="padding:10px;border-bottom:1px solid #222;"
                    th:text="${#numbers.formatDecimal(item.totalPrice,1,'POINT',2,'POINT')} + ' €'">0.00 €</td>
                <td style="padding:10px;border-bottom:1px solid #222;">
                    <form th:action="@{/orders/items/{id}/remove(id=${item.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" style="background:#ff1a1a;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;">
                            Remove
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <h3 style="margin-top:20px;">
            Total:
            <span th:text="${#numbers.formatDecimal(pendingOrder.amount,1,'POINT',2,'POINT')} + ' €'">0.00 €</span>
        </h3>

        <div style="display:flex;gap:12px;margin-top:20px;">
            <a th:href="@{/menu}" href="/menu" style="color:#ff4d4d;">Back to menu</a>

            <form th:action="@{/orders/complete}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" style="background:#ff1a1a;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;">
                    Complete order
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
