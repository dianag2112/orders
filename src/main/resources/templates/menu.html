<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Magelan — pirate-themed restaurant menu." />
    <meta name="theme-color" content="#000000" />

    <title>Magelan — Menu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/menu.css}" href="/menu.css" />
</head>

<body>
<a class="skip-link" href="#menu">Skip to menu</a>

<div class="lang-switcher" aria-label="Language switcher">
    <button type="button" data-lang-switch="bg">БГ</button>
    <button type="button" data-lang-switch="en">EN</button>
</div>

<header class="hero">
    <div class="hero__inner">
        <div class="brand">
            <a th:href="@{/home}">
                <img class="brand__logo" src="/magelan-index.jpg" alt="Magelan logo">
            </a>
            <p class="brand__sub">Restaurant Menu</p>
        </div>
    </div>
</header>

<main id="menu" class="container">

    <section class="section" th:each="section : ${menuSections}">
        <details class="accordion">
            <summary class="accordion__summary">
                <h2 class="section__title" th:utext="${section.title}">Section title</h2>
            </summary>

            <div class="accordion__content">
                <div class="menu-list">

                    <!-- Products without subcategory -->
                    <div th:each="product : ${section.directProducts}">
                        <form th:action="@{/orders/add-item}" method="post" class="menu-item-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="productId" th:value="${product.id}">

                            <button type="submit" class="menu-item-btn" th:attr="aria-label='Add ' + ${product.name}">
                                <div class="menu-row">
                                    <span class="item-name" th:utext="${product.name}">Item name</span>
                                    <span class="item-dots"></span>
                                    <span class="item-price"
                                          th:text="${#numbers.formatDecimal(product.price,1,'POINT',2,'POINT')} + ' €'">
                                        0.00 €
                                    </span>
                                </div>

                                <p class="item-desc"
                                   th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                                   th:utext="${product.description}">
                                    Description
                                </p>
                            </button>
                        </form>
                    </div>

                    <!-- Products inside subcategories -->
                    <div th:each="sub : ${section.subcategories}">
                        <h3 class="subcat"
                            th:if="${sub.title != null and !#strings.isEmpty(sub.title)}"
                            th:utext="${sub.title}">
                            Subcategory
                        </h3>

                        <div th:each="product : ${sub.products}">
                            <form th:action="@{/orders/add-item}" method="post" class="menu-item-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="productId" th:value="${product.id}">

                                <button type="submit" class="menu-item-btn" th:attr="aria-label='Add ' + ${product.name}">
                                    <div class="menu-row">
                                        <span class="item-name" th:utext="${product.name}">Item name</span>
                                        <span class="item-dots"></span>
                                        <span class="item-price"
                                              th:text="${#numbers.formatDecimal(product.price,1,'POINT',2,'POINT')} + ' €'">
                                            0.00 €
                                        </span>
                                    </div>

                                    <p class="item-desc"
                                       th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                                       th:utext="${product.description}">
                                        Description
                                    </p>
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </details>
    </section>

    <footer class="footer">
        <div class="footer__box">
            <p class="footer__text">
                <span class="footer-msg">
                    За информация за алергени и други въпроси, моля обърнете се към нашия екип. / For allergens &amp; special requests, please ask our crew.
                </span>
                <span class="footer__muted">•</span>
                <span class="footer__copy">© <span id="year"></span> Magelan</span>
            </p>
        </div>
    </footer>

</main>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const DEFAULT_LANG = 'bg';
    const TRANS_SELECTORS = '.section__title, .item-name, .subcat, .item-desc, .footer-msg, .brand__sub';

    function prepareTranslations() {
        document.querySelectorAll(TRANS_SELECTORS).forEach(el => {
            if (el.dataset.bg && el.dataset.en) return;

            const html = el.innerHTML;
            if (!html.includes(' / ')) return;

            const parts = html.split(' / ');
            if (parts.length < 2) return;

            const bgPart = parts[0].trim();
            const enPart = parts.slice(1).join(' / ').trim();

            el.dataset.bg = bgPart;
            el.dataset.en = enPart;
        });
    }

    function setLanguage(lang) {
        document.documentElement.setAttribute('lang', lang);
        localStorage.setItem('lang', lang);

        document.querySelectorAll(TRANS_SELECTORS).forEach(el => {
            const bg = el.dataset.bg;
            const en = el.dataset.en;
            if (!bg || !en) return;
            el.innerHTML = (lang === 'bg' ? bg : en);
        });

        document.querySelectorAll('[data-lang-switch]').forEach(btn => {
            btn.classList.toggle('is-active', btn.dataset.langSwitch === lang);
        });
    }

    function initLangSwitcher() {
        prepareTranslations();

        document.querySelectorAll('[data-lang-switch]').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.dataset.langSwitch;
                setLanguage(lang);
            });
        });

        const savedLang = localStorage.getItem('lang') || DEFAULT_LANG;
        setLanguage(savedLang);
    }

    document.addEventListener('DOMContentLoaded', initLangSwitcher);
</script>

</body>
</html>
